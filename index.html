<!DOCTYPE html>
<html>
<head>
<title>🏆 Efootball BD Tournament PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0}
header{padding:15px;text-align:center;background:#1e293b;font-size:20px;font-weight:bold}
.container{padding:10px;max-width:900px;margin:auto}
.card{background:#1e293b;padding:10px;margin:10px 0;border-radius:10px}
input,button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:6px}
button{background:#22c55e;color:white;font-weight:bold}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #334155;padding:8px;text-align:center}
th{background:#0ea5e9}
.badge{background:#22c55e;padding:3px 8px;border-radius:10px}
.small{font-size:12px;color:#94a3b8}
</style>
</head>

<body>

<header>🏆 Efootball BD Tournament PRO SYSTEM</header>

<div class="container">

<!-- LOGIN -->
<div class="card">
<h3>🔐 Admin Login</h3>
<input type="password" id="pass">
<button onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div class="card" id="admin" style="display:none">
<h3>⚽ Add Match Result</h3>

<input id="t1" placeholder="Team 1">
<input id="t2" placeholder="Team 2">
<input id="s1" type="number" placeholder="Score 1">
<input id="s2" type="number" placeholder="Score 2">

<button onclick="addMatch()">Save Match</button>
</div>

<!-- GROUPS -->
<div class="card">
<h3>👥 Groups</h3>
<p id="groups"></p>
</div>

<!-- TABLE -->
<div class="card">
<h3>📊 Live Table</h3>
<table id="table">
<tr><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>Pts</th></tr>
</table>
</div>

<!-- QUALIFIED -->
<div class="card">
<h3>🏆 Qualified Teams</h3>
<p id="qualify"></p>
</div>

<!-- KNOCKOUT -->
<div class="card">
<h3>🌳 Knockout Stage</h3>
<p id="knockout"></p>
</div>

</div>

<script>

let password="1234";

let teams=[
"Team1","Team2","Team3","Team4",
"Team5","Team6","Team7","Team8",
"Team9","Team10","Team11","Team12"
];

let stats={};
teams.forEach(t=>{
stats[t]={p:0,w:0,d:0,l:0,pts:0};
});

// 🔐 LOGIN
function login(){
if(document.getElementById("pass").value===password){
document.getElementById("admin").style.display="block";
}
}

// ⚽ MATCH SYSTEM
function addMatch(){

let t1=document.getElementById("t1").value;
let t2=document.getElementById("t2").value;
let s1=+document.getElementById("s1").value;
let s2=+document.getElementById("s2").value;

stats[t1].p++;
stats[t2].p++;

if(s1>s2){
stats[t1].w++; stats[t2].l++;
}
else if(s2>s1){
stats[t2].w++; stats[t1].l++;
}
else{
stats[t1].d++; stats[t2].d++;
}

updatePoints();
render();
}

// 📊 POINT CALC
function updatePoints(){
Object.keys(stats).forEach(t=>{
stats[t].pts = stats[t].w*3 + stats[t].d;
});
}

// 📊 TABLE
function render(){

let table=document.getElementById("table");
table.innerHTML=`<tr><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>Pts</th></tr>`;

let sorted=Object.entries(stats).sort((a,b)=>b[1].pts-a[1].pts);

sorted.forEach(([t,s])=>{
table.innerHTML+=`
<tr>
<td>${t}</td>
<td>${s.p}</td>
<td>${s.w}</td>
<td>${s.d}</td>
<td>${s.l}</td>
<td><span class="badge">${s.pts}</span></td>
</tr>`;
});

// 👥 GROUPS
let gA=teams.slice(0,4);
let gB=teams.slice(4,8);
let gC=teams.slice(8,12);

document.getElementById("groups").innerHTML=
"Group A: "+gA.join(", ")+"<br>"+
"Group B: "+gB.join(", ")+"<br>"+
"Group C: "+gC.join(", ");

// 🏆 QUALIFIED TOP 2 EACH GROUP
let sortedTeams=Object.entries(stats).sort((a,b)=>b[1].pts-a[1].pts);

let qualified=[
sortedTeams[0][0],sortedTeams[1][0],
sortedTeams[2][0],sortedTeams[3][0],
sortedTeams[4][0],sortedTeams[5][0]
];

document.getElementById("qualify").innerHTML=
qualified.map(t=>`<span class="badge">${t}</span>`).join(" ");

// 🌳 KNOCKOUT
document.getElementById("knockout").innerHTML=`
🥇 QF1: ${qualified[0]} vs ${qualified[5]}<br>
🥈 QF2: ${qualified[1]} vs ${qualified[4]}<br>
🥉 QF3: ${qualified[2]} vs ${qualified[3]}<br>
`;

}

render();

</script>

</body>
</html>
